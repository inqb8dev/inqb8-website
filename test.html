<!DOCTYPE html>
<html lang="nl" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test pagina — Inqb8</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ink':    '#0D0F14',
            'ink-2':  '#1E2128',
            'ink-3':  '#2C303A',
            'smoke':  '#6B7280',
            'paper':  '#F4F4F0',
            'accent': '#2563EB',
            'accent-hover': '#1D4ED8',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>html { background-color: #0D0F14; }</style>
</head>
<body class="bg-ink text-paper font-sans antialiased">

  <!-- NAV -->
  <nav class="fixed top-0 left-0 right-0 z-50 border-b border-ink-3 bg-ink/90 backdrop-blur-sm">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center h-full">
        <img src="assets/logo.png" alt="Inqb8" class="h-10 object-contain" />
      </a>
      <div class="hidden md:flex items-center gap-8 text-sm text-smoke">
        <a href="/#model" class="hover:text-paper transition-colors">Model</a>
        <a href="/#hoe" class="hover:text-paper transition-colors">Werkwijze</a>
        <a href="/#portfolio" class="hover:text-paper transition-colors">Portfolio</a>
        <a href="/#contact" class="hover:text-paper transition-colors">Contact</a>
      </div>
      <a href="/#contact" class="text-sm font-medium bg-accent hover:bg-accent-hover text-white px-4 py-2 transition-colors">
        Neem contact op
      </a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="min-h-screen flex flex-col items-center justify-center pt-16 px-6">
    <div class="max-w-2xl w-full py-32 text-center">
      <span class="font-mono text-accent text-sm tracking-widest uppercase">Testomgeving</span>
      <h1 class="mt-6 text-4xl md:text-5xl font-black text-paper leading-tight">
        Test pagina — Inqb8
      </h1>
      <p class="mt-4 text-smoke text-sm font-mono">// agent-pipeline verificatie</p>
      <div class="mt-12 border border-ink-3 bg-ink-2 p-4 inline-block">
        <img src="assets/clown-test.png" alt="Clown test" class="max-w-full h-auto max-h-96" id="clown-img" />
      </div>
      <p class="mt-6 text-smoke text-sm">
        Afbeelding geladen via Canva → GitHub → Vercel pipeline.
      </p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="border-t border-ink-3 py-8">
    <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
      <img src="assets/logo.png" alt="Inqb8" class="h-8 object-contain" />
      <div class="text-smoke text-sm">© 2026 Inqb8. Alle rechten voorbehouden.</div>
      <div class="font-mono text-smoke text-xs">inqb8.nl</div>
    </div>
  </footer>

</body>
</html>
