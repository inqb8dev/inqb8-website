<!DOCTYPE html>
<html lang="nl" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Test — Inqb8</title>
  <meta name="description" content="AI Agent testpagina voor Inqb8 — AI-gedreven Venture Studio." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ink':    '#0D0F14',
            'ink-2':  '#1E2128',
            'ink-3':  '#2C303A',
            'smoke':  '#6B7280',
            'paper':  '#F4F4F0',
            'accent': '#2563EB',
            'accent-hover': '#1D4ED8',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>
</head>
<body class="bg-ink text-paper font-sans antialiased">

  <nav class="fixed top-0 left-0 right-0 z-50 border-b border-ink-3 bg-ink/90 backdrop-blur-sm">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center h-full">
        <img src="assets/logo.png" alt="Inqb8" class="h-10 object-contain">
      </a>
      <div class="hidden md:flex items-center gap-8 text-sm text-smoke">
        <a href="/#model" class="hover:text-paper transition-colors">Model</a>
        <a href="/#hoe" class="hover:text-paper transition-colors">Werkwijze</a>
        <a href="/#portfolio" class="hover:text-paper transition-colors">Portfolio</a>
        <a href="/#contact" class="hover:text-paper transition-colors">Contact</a>
      </div>
      <a href="/#contact" class="text-sm font-medium bg-accent hover:bg-accent-hover text-white px-4 py-2 transition-colors">
        Neem contact op
      </a>
    </div>
  </nav>

  <main class="pt-16">
    <section class="min-h-screen flex flex-col items-center justify-center px-6 py-24">
      <div class="max-w-2xl w-full text-center">
        <div class="inline-block font-mono text-xs text-accent border border-accent/30 bg-accent/5 px-3 py-1 mb-6 tracking-widest uppercase">
          Test pagina
        </div>
        <h1 class="text-4xl md:text-5xl font-semibold tracking-tight text-paper mb-4">
          AI Agent Test — Inqb8
        </h1>
        <p class="text-smoke text-lg mb-12">
          Testpagina voor beeldweergave en huisstijlvalidatie.
        </p>
        <div class="rounded-sm overflow-hidden border border-ink-3 shadow-2xl">
          <img
            src="assets/ai-agent-test.png"
            alt="AI Agent — Inqb8"
            class="w-full object-cover"
            id="ai-agent-img"
          />
        </div>
        <p class="mt-6 font-mono text-xs text-smoke">
          <a href="/" class="hover:text-paper transition-colors">← Terug naar inqb8.nl</a>
        </p>
      </div>
    </section>
  </main>

  <footer class="border-t border-ink-3 py-8">
    <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
      <img src="assets/logo.png" alt="Inqb8" class="h-8 object-contain">
      <div class="text-smoke text-sm">© 2026 Inqb8. Alle rechten voorbehouden.</div>
      <div class="font-mono text-smoke text-xs">inqb8.nl</div>
    </div>
  </footer>

</body>
</html>
